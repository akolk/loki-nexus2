<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pydantic AI Workspace</title>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
        /* Full screen layout */
        body, html { font-family: sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; width: 100vw; background: #fff; }

        /* Map Container (Hidden by default) */
        #map-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: #f0f0f0;
            display: none;
        }

        /* Settings Panel Sidebar */
        #settings-sidebar {
            position: fixed;
            top: 0; left: 0; width: 20%; height: 100%;
            background: white;
            z-index: 200000;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
            display: none; /* Hidden by default */
            flex-direction: column;
            overflow-y: auto;
            border-right: 1px solid #ccc;
        }

        /* Settings Toggle Button (Hamburger) */
        #settings-toggle {
            cursor: pointer;
            font-weight: bold;
            font-size: 20px;
            user-select: none;
            padding: 5px;
            margin-right: 10px;
        }

        .settings-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            font-weight: bold;
            font-size: 1.2em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .settings-section {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .settings-section h4 {
            margin: 0 0 10px 0;
            font-size: 1em;
            color: #333;
        }

        /* Mode Switcher (Moved to settings) */
        #mode-switcher {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            user-select: none;
            border: 1px solid #ccc;
            text-align: center;
        }

        /* Chat Widget Container (Bottom Left) */
        #chat-widget {
            position: absolute;
            bottom: 20px; left: 20px;
            z-index: 4000;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        /* Chat Bubble (Default state) */
        #chat-bubble {
            position: fixed !important;
            bottom: 20px !important;
            left: 20px !important;
            width: 80px !important;
            height: 80px !important;
            border-radius: 50% !important;
            background: #00529B !important; /* Kadaster blue */
            color: white !important;
            display: flex !important;
            justify-content: center !important;
            align-items: center !important;
            cursor: pointer !important;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5) !important;
            font-size: 14px !important;
            font-weight: bold !important;
            font-family: Arial, sans-serif !important;
            z-index: 99999 !important;
        }
        #chat-bubble:hover { transform: scale(1.1); }

        /* Chat Window (Hidden by default) */
        #chat-window {
            position: fixed;
            top: 0; left: 0;
            width: 450px;
            max-width: 45%;
            height: 100vh;
            background: white;
            box-shadow: 4px 0 12px rgba(0,0,0,0.15);
            display: none;
            flex-direction: column;
            border-right: 1px solid #ddd;
            z-index: 100000;
            border-radius: 0 15px 15px 0;
        }

        .chat-header {
            padding: 15px;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 0.9em; word-wrap: break-word; }
        .user { background: #E3F2FD; align-self: flex-end; border-bottom-right-radius: 2px; color: #003366; }
        .model { background: #FFF9C4; align-self: flex-start; border-bottom-left-radius: 2px; color: #333; }

        .related-bubbles-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 5px;
        }

        .related-bubble {
            background: #fff;
            color: #00529B;
            border: 1px solid #00529B;
            border-radius: 20px;
            padding: 5px 10px;
            font-size: 0.8em;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            display: inline-block;
            max-width: 100%;
            word-wrap: break-word;
        }

        .related-bubble:hover {
            background: #00529B;
            color: #fff;
        }

        .message-icons-container {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-top: 4px;
            border-top: 1px solid rgba(0,0,0,0.1);
        }

        .message-icons-container span {
            cursor: pointer;
            font-size: 0.9em;
            padding: 2px 6px;
            border-radius: 4px;
            transition: background 0.2s;
        }

        .message-icons-container span:hover {
            background: rgba(0,0,0,0.1);
        }

        .chat-footer {
            padding: 10px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 5px;
            align-items: flex-end;
        }

        input[type="text"], textarea#message-input { 
            flex: 1; 
            padding: 8px 12px; 
            border: 1px solid #ccc; 
            border-radius: 20px; 
            outline: none; 
            resize: none;
            overflow: hidden;
            min-height: 38px;
            max-height: 150px;
            font-family: inherit;
            font-size: inherit;
            line-height: 1.4;
        }
        textarea#message-input {
            border-radius: 15px;
        }
        button { padding: 8px 15px; background: #00529B; color: white; border: none; border-radius: 20px; cursor: pointer; }
        button:hover { background: #003d73; }

        /* Job Panel (Moved to settings) */
        .job-panel, .tools-panel, .research-panel {
            /* Now part of settings-section, so remove the old specific hiding */
        }

        /* Rendered output container */
        .result-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 5px;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 5px;
        }
        .result-container img { max-width: 100%; height: auto; }
        .result-container iframe { width: 100%; height: 300px; border: none; }
        table.dataframe { border-collapse: collapse; width: 100%; font-size: 0.8em; }
        table.dataframe th, table.dataframe td { border: 1px solid #ddd; padding: 4px; text-align: left; }

        /* Post-it Notes Container */
        #postit-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            pointer-events: none; /* Let clicks pass through except on notes */
            z-index: 10;
        }

        /* Individual Post-it Note */
        .postit-note {
            position: absolute;
            width: 300px;
            background: #E3F2FD; /* Kadaster light blue - like water on maps */
            background-image: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.05) 100%);
            box-shadow: 2px 5px 10px rgba(0,0,0,0.3);
            border-bottom-right-radius: 20px 5px;
            padding: 15px;
            pointer-events: auto; /* Catch clicks */
            font-family: 'Arial', sans-serif;
            color: #003366; /* Kadaster dark blue */
            cursor: move;
            display: flex;
            flex-direction: column;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-radius 0.4s ease-in-out;
            box-sizing: border-box;
            border: 1px solid #B3D4FC;
        }

        .postit-note.maximized {
            z-index: 1999 !important; /* Just below chat widget (2000) */
            border-radius: 0;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            cursor: default; /* No longer draggable */
            /* width, height, top, left, transform will be handled in JS */
        }

        .postit-note:nth-child(even) {
            background: #FFF9C4; /* Cream/yellow - like old paper documents */
            border-color: #FFE082;
        }
        .postit-note:nth-child(3n) {
            background: #E8F5E9; /* Light green - like land/grass on maps */
            border-color: #C8E6C9;
        }
        .postit-note:nth-child(5n) {
            background: #F3E5F5; /* Light purple */
            border-color: #E1BEE7;
            color: #4A148C;
        }

        /* Draggable Header for Note */
        .postit-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 5px;
            gap: 5px;
        }

        .postit-header button {
            background: transparent;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 5px;
            opacity: 0.6;
            border-radius: 0;
        }
        .postit-header button:hover {
            opacity: 1;
            background: rgba(0,0,0,0.1);
        }

        .postit-content {
            flex: 1;
            overflow: auto;
            max-height: 400px;
            /* Reset font for content to be readable */
            font-family: sans-serif;
            background: rgba(255,255,255,0.8);
            padding: 5px;
            border-radius: 4px;
        }

        .postit-note.maximized .postit-content {
            max-height: none;
            height: 100%;
        }

        /* Remove default result-container border in postit */
        .postit-content .result-container {
            border: none;
            box-shadow: none;
            margin-top: 0;
            padding: 0;
        }

        .postit-note.pinned {
            z-index: 1000 !important;
            box-shadow: 0 0 10px 2px rgba(255, 0, 0, 0.5);
        }

        .postit-note.collapsed {
            min-width: auto;
            height: auto;
            border-radius: 20px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .postit-note.collapsed .postit-content {
            display: none;
        }

        /* Post-it Group Container */
        .postit-group {
            position: absolute;
            background: rgba(0,0,0,0.05);
            border: 2px dashed #999;
            padding: 10px;
            border-radius: 10px;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            min-width: 340px;
            min-height: 200px;
            z-index: 5;
            cursor: move;
            transition: min-height 0.3s ease, min-width 0.3s ease;
        }

        .postit-group.collapsed {
            min-width: auto;
            min-height: auto;
            border-style: solid;
            background: rgba(0,0,0,0.1);
        }

        .postit-group.collapsed .postit-group-content {
            display: none;
        }

        .postit-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: move;
        }

        .postit-group-header input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #ccc;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            outline: none;
            width: 70%;
        }

        .postit-group-content {
            position: relative;
            flex: 1;
            min-height: 100px;
        }

        /* Notes inside a group */
        .postit-group-content .postit-note {
            position: relative;
            margin-bottom: 10px;
            transform: none !important;
            box-shadow: 1px 2px 5px rgba(0,0,0,0.2);
        }

    </style>
    <!-- Plotly JS -->
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body>

    <!-- Map Container -->
    <div id="map-container"></div>

    <!-- Post-it Container -->
    <div id="postit-container"></div>

    <!-- Settings Sidebar Panel -->
    <div id="settings-sidebar" onmouseleave="closeSettings()">
        <div class="settings-header">
            <span>Settings</span>
            <span style="cursor:pointer;" onclick="closeSettings()">&#x2715;</span>
        </div>

        <div class="settings-section">
            <div id="mode-switcher" onclick="toggleMode()">
                Map Mode: <span id="mode-label" style="color: black;">OFF</span>
            </div>
        </div>

        <div class="settings-section tools-panel">
            <h4>Tools</h4>
            <div style="font-size:0.9em; font-weight:bold; margin-bottom:5px;">MCP Server</div>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <select id="mcp-type" style="padding:4px; font-size:0.8em; width:30%;">
                    <option value="">Type</option>
                    <option value="SSE">SSE</option>
                    <option value="STDIO">STDIO</option>
                </select>
                <input type="text" id="mcp-url" placeholder="URL or Command" style="flex:1; font-size:0.8em; padding:4px;">
            </div>
            <div style="font-size:0.9em; font-weight:bold; margin-bottom:5px;">Skill (ZIP)</div>
            <div style="display:flex; gap:5px;">
                <input type="file" id="skill-file" accept=".zip" style="font-size:0.8em; width:100%;">
            </div>
        </div>

        <div class="settings-section job-panel">
            <h4>Jobs</h4>
            <div style="font-size:0.9em; font-weight:bold; margin-bottom:5px;">Schedule Job</div>
            <div style="display:flex; gap:5px; margin-bottom:5px;">
                <input type="text" id="job-query" placeholder="Query" style="flex:2; font-size:0.8em; padding:4px;">
                <input type="number" id="job-interval" placeholder="Sec" value="3600" style="flex:1; font-size:0.8em; padding:4px;">
            </div>
            <button onclick="scheduleJob()" style="padding: 4px 10px; font-size: 0.8em; width:100%;">Add Job</button>
            <div id="status" style="font-size: 0.8em; color: #666; margin-top: 5px; text-align:center;"></div>
        </div>

        <div class="settings-section research-panel">
            <h4>Research</h4>
            <div style="font-size:0.9em; font-weight:bold; margin-bottom:5px;">Deep Research</div>
            <div style="display:flex; flex-direction: column; gap:5px; margin-bottom:5px;">
                <input type="text" id="research-query" placeholder="Research Topic" style="font-size:0.8em; padding:4px; box-sizing: border-box; width:100%;">
                <input type="text" id="research-format" placeholder="Format" value="Markdown" style="font-size:0.8em; padding:4px; box-sizing: border-box; width:100%;">
            </div>
            <button onclick="startDeepResearch()" style="padding: 4px 10px; font-size: 0.8em; width:100%;">Start Research</button>
            <div id="research-status" style="font-size: 0.8em; color: #666; margin-top: 5px; text-align:center;"></div>
        </div>

        <div class="settings-section metadata-panel" id="metadata-section">
            <h4>Metadata</h4>
            <div id="metadata-status" style="font-size: 0.8em;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>PDOK OGC:</span>
                    <span id="pdok-count">Loading...</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                    <span>CBS:</span>
                    <span id="cbs-count">Loading...</span>
                </div>
                <button onclick="refreshMetadata()" style="padding: 4px 10px; font-size: 0.8em; width:100%;">Refresh</button>
            </div>
        </div>

        <div class="settings-section job-panel-admin" id="jobs-admin-section" style="display:none;">
            <h4>Metadata Jobs (Admin)</h4>
            <div id="jobs-status" style="font-size: 0.8em;">
                <div style="margin-bottom: 5px;">
                    <strong>PDOK Sync:</strong>
                    <span id="pdok-job-status">-</span>
                </div>
                <div style="margin-bottom: 5px;">
                    <strong>CBS Sync:</strong>
                    <span id="cbs-job-status">-</span>
                </div>
                <button onclick="runMetadataJob(1)" style="padding: 3px 8px; font-size: 0.7em; margin-right: 5px;">Run PDOK</button>
                <button onclick="runMetadataJob(2)" style="padding: 3px 8px; font-size: 0.7em;">Run CBS</button>
            </div>
        </div>
    </div>

    <!-- Chat Widget -->
    <div id="chat-widget">
        <!-- Chat Window -->
        <div id="chat-window">
            <div class="chat-header">
                <div style="display: flex; align-items: center;">
                    <div id="settings-toggle" onclick="toggleSettings()">&#9776;</div>
                    <strong id="chat-header-title">Workspace Agent</strong>
                </div>
                <div>
                    <button style="border:none;background:none;cursor:pointer;font-size:16px;margin-right:5px;" onclick="clearUIHistory()" title="Clear Chat Window">🧹</button>
                    <button style="border:none;background:none;cursor:pointer;font-size:16px;margin-right:10px;" onclick="clearDBHistory()" title="Clear DB History">🗑️</button>
                    <span style="cursor:pointer;" onclick="toggleChat()">&#x2715;</span>
                </div>
            </div>

            <div class="chat-body" id="chat-history">
                <!-- Messages will appear here -->
            </div>

            <div class="chat-footer">
                <textarea id="message-input" placeholder="Type a message..." onkeypress="handleKey(event)" oninput="autoGrow(this)"></textarea>
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

<!-- Chat Bubble -->
<div id="chat-bubble" onclick="toggleChat()">Chat</div>
    </div>

    <!-- Modal Popup for Info Display -->
    <div id="info-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:5000;">
        <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:white; border-radius:8px; padding:20px; max-width:90%; max-height:90%; width:800px; overflow:auto; box-shadow:0 4px 20px rgba(0,0,0,0.3); border: 2px solid #00529B;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px; border-bottom:2px solid #00529B; padding-bottom:10px;">
                <h3 id="modal-title" style="margin:0; color: #00529B;">Title</h3>
                <button onclick="closeModal()" style="border:none; background:none; font-size:24px; cursor:pointer; color: #00529B;">&times;</button>
            </div>
            <div id="modal-content" style="white-space:pre-wrap; font-family:monospace; font-size:0.9em; max-height:70vh; overflow-y:auto;"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
